<!DOCTYPE html>

<html>

<head>

<title>LUNA Register</title>

{% load static %}

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

<div class="container">

<h1>🌙 LUNA</h1>

<h2>📝 Create Account</h2>

<form method="POST">

{% csrf_token %}

<input

type="text"

name="name"

placeholder="Name"

required>

<br><br>

<input

type="email"

name="email"

placeholder="Email"

required>

<br><br>

<input

type="password"

name="password"

placeholder="Password"

required>

<br><br>

<button type="submit">

🚀 Register

</button>

</form>

<br>

{{ message }}

<br><br>

<a href="/login/">

🔐 Go to Login

</a>

</div>

</body>

</html>
