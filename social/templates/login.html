<!DOCTYPE html>

<html>

<head>

<title>LUNA Login</title>

{% load static %}

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

<div class="container">

<h1>🌙 LUNA</h1>

<h2>🔐 Login</h2>

<form method="POST">

{% csrf_token %}

<input

type="email"

name="email"

placeholder="Email"

required>

<br><br>

<input

type="password"

name="password"

placeholder="Password"

required>

<br><br>

<button type="submit">

🚀 Login

</button>

</form>

<br>

{{ message }}

<br><br>

<a href="/register/">

📝 Create an account

</a>

</div>

</body>

</html>
